# debian 12, s390x only, no security updates
version: 1

sources:
  - channel: bookworm main
    url: https://snapshot.debian.org/archive/debian/20260719T202153Z
  - channel: bookworm-updates main
    url: https://snapshot.debian.org/archive/debian/20260719T202153Z

archs:
  - s390x

packages:
  - base-files
  - ca-certificates
  - libc6
  - libc-bin
  - libssl3
  - netbase
  - openssl
  - tzdata
  - media-types
  # c++
  - gcc-12-base
  - libgcc-s1
  - libgomp1
  - libstdc++6
