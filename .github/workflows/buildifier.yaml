name: Buildifier

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  autoformat:
    name: Auto-format and Check
    runs-on: ubuntu-latest

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Check out code
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          go install github.com/bazelbuild/buildtools/buildifier@3.2.0

      - name: Run buildifier
        run: |
          ./knife lint --check
