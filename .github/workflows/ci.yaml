name: CI

on:
  workflow_dispatch: # Allow manual runs.
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lockfile:
    name: Check lockfile up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check lockfile
        run: bazel mod deps --lockfile_mode=error

  ci-build-test:
    name: CI build and unit test
    runs-on: distroless-ci-large-ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Safe runner persistence probe
        shell: bash
        run: |
          set -eu
          MARKER="distroless-marker-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-ci1"
          echo "[probe] writing marker: ${MARKER}"
          mkdir -p "$HOME/.cache/distroless-runner-probe"
          echo "$MARKER" > "$HOME/.cache/distroless-runner-probe/marker-ci1.txt"
          echo "$MARKER" > /tmp/distroless-runner-probe-marker-ci1.txt
          echo "[probe] current marker files:"
          ls -la "$HOME/.cache/distroless-runner-probe" || true
          ls -la /tmp/distroless-runner-probe-marker-ci1.txt || true
          echo "[probe] searching for older markers:"
          find "$HOME/.cache/distroless-runner-probe" /tmp \
            -maxdepth 2 \
            -type f \
            -name '*distroless*marker*' \
            -print \
            -exec sh -c 'echo "--- $1"; sed -n "1p" "$1"' sh {} \
            \; \
            2>/dev/null || true
      - name: Mount bazel caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel-repo
          key: bazel-cache-deps-ci1-${{ github.sha }}
          restore-keys: |
            bazel-cache-deps-ci1-${{ github.sha }}
            bazel-cache-deps-ci1-

      - name: Fetch # this can take a long time if there are a lot of errors
        run: |
          for i in $(seq 10); do
            bazel --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc fetch //... && break || sleep 180;
          done
      - name: Build All Images
        run: |
          set -e
          targets=$(bazel query 'kind(oci_image, deps(:sign_and_push))')
          bazel --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc build $targets
      - name: Unit Tests
        run: bazel --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc test //... --build_tests_only
      - name: Build Examples
        run: bazel --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc build //examples/...

  ci-images:
    name: CI image tests
    runs-on: distroless-ci-large-ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Safe runner persistence probe
        shell: bash
        run: |
          set -eu
          MARKER="distroless-marker-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-ci2"
          echo "[probe] writing marker: ${MARKER}"
          mkdir -p "$HOME/.cache/distroless-runner-probe"
          echo "$MARKER" > "$HOME/.cache/distroless-runner-probe/marker-ci2.txt"
          echo "$MARKER" > /tmp/distroless-runner-probe-marker-ci2.txt
          echo "[probe] current marker files:"
          ls -la "$HOME/.cache/distroless-runner-probe" || true
          ls -la /tmp/distroless-runner-probe-marker-ci2.txt || true
          echo "[probe] searching for older markers:"
          find "$HOME/.cache/distroless-runner-probe" /tmp \
            -maxdepth 2 \
            -type f \
            -name '*distroless*marker*' \
            -print \
            -exec sh -c 'echo "--- $1"; sed -n "1p" "$1"' sh {} \
            \; \
            2>/dev/null || true
      - name: Mount bazel caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel-repo
          key: bazel-cache-deps-ci2-${{ github.sha }}
          restore-keys: |
            bazel-cache-deps-ci2-${{ github.sha }}
            bazel-cache-deps-ci2-

      - name: Fetch
        run: |
          for i in $(seq 20); do
            bazel --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc cquery 'attr(tags, "amd64", ...)' && break
            sleep 10;
          done

      - name: Image Tests
        run: bazel --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc test $(bazel query 'attr(tags, "amd64", ...)')
